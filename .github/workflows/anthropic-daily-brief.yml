name: Anthropic Daily Brief

on:
  schedule:
    # Every hour at :00. The script decides whether to send.
    # - At 7 AM America/New_York -> always sends the full daily brief.
    # - Other hours -> only sends if new items are detected.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_daily:
        description: "Force-send the daily brief now"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: anthropic-daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history to commit state back.
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide if this run is the daily window (7 AM ET)
        id: window
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          et = datetime.now(ZoneInfo("America/New_York"))
          is_daily = et.hour == 7
          print(f"force_daily={'1' if is_daily else '0'}")
          print(f"et_now={et.isoformat()}")
          PY

      - name: Run watcher
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_DAILY: ${{ inputs.force_daily && '1' || steps.window.outputs.force_daily }}
          STATE_FILE: scripts/.watcher_state.json
        run: python scripts/anthropic_watcher.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain scripts/.watcher_state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/.watcher_state.json
            git commit -m "chore(watcher): record state update from Anthropic sources"
            git push
          else
            echo "No state changes to commit."
          fi
