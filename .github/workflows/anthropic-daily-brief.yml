name: Anthropic Daily Brief

on:
  schedule:
    # Every hour at :00. The script decides what to send:
    # - 7 AM America/New_York   -> full daily brief.
    # - Friday 7 AM ET          -> ALSO sends weekly themes.
    # - Any hour with new items -> saved-search alerts + daily brief.
    # - Any hour with no matches -> nothing (state still committed).
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_daily:
        description: "Force-send the daily brief now"
        type: boolean
        default: true
      force_weekly:
        description: "Also send the weekly themes email"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: anthropic-daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide which modes to force based on ET time
        id: window
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          et = datetime.now(ZoneInfo("America/New_York"))
          is_daily  = et.hour == 7
          is_weekly = is_daily and et.weekday() == 4  # Mon=0 .. Fri=4
          print(f"force_daily={'1' if is_daily else '0'}")
          print(f"force_weekly={'1' if is_weekly else '0'}")
          print(f"et_now={et.isoformat()}")
          PY

      - name: Run watcher
        env:
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_DAILY:       ${{ inputs.force_daily  && '1' || steps.window.outputs.force_daily }}
          FORCE_WEEKLY:      ${{ inputs.force_weekly && '1' || steps.window.outputs.force_weekly }}
          STATE_FILE:        scripts/.watcher_state.json
        run: python scripts/anthropic_watcher.py

      - name: Commit state + archive if changed
        run: |
          CHANGES=$(git status --porcelain scripts/.watcher_state.json docs/briefs/ 2>/dev/null || true)
          if [ -n "$CHANGES" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/.watcher_state.json docs/briefs/ 2>/dev/null || true
            git commit -m "chore(watcher): record state and archive brief"
            git push
          else
            echo "Nothing to commit."
          fi
